name: 'Execução Integrada'

on:
  workflow_run:
    workflows: ['Execução Manual', 'Execução Agendada']
    types:
      - completed

jobs:
  inspecao:
    runs-on: ubuntu-latest 

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando do Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Inspenção de código
        run: yarn run lint

  unidade:
    runs-on: ubuntu-latest 
    needs: [inspecao]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando do Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Executando os testes unitários
        run: yarn run test-unit

  e2e:
    runs-on: ubuntu-latest 
    needs: [inspecao]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando do Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Instalando os Browsers do Playwright
        run: npx playwright install

      - name: Executando os testes e2e
        run: yarn run test-e2e
    
  deploy:
    runs-on: ubuntu-latest 
    needs: [unidade, e2e]
    steps:
      - name: Simulação de Deploy
        run: echo "Deploy sendo realizado..."

      

