name: 'Execução Integrada'

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  inspecao:
    runs-on: ubuntu-latest 

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando do Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Inspenção de código
        run: yarn run lint

  e2e:
    runs-on: ubuntu-latest 
    needs: [inspecao]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando do Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Instalando os Browsers do Playwright
        run: npx playwright install

      - name: Executando os testes e2e
        run: yarn run test-e2e

      - name: Gerando relatório de testes
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          path: ./playwright-report
          name: Relatório de Testes E2E

    
  deploy:
    runs-on: ubuntu-latest 
    needs: [e2e]
    steps:
      - name: Simulação de Deploy
        run: echo "Deploy sendo realizado..."

      

