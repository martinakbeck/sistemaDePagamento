name: 'Execução Integrada'

on:
  workflow_run:
    workflows: ['Execução Manual', 'Execução Agendada']
    types:
      - completed

jobs:
  e2e-tests:
    runs-on: ubuntu-latest 

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Instalando do Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn
        
      - name: Inspenção de código
        run: yarn run lint 

      - name: Instalando os Browsers do Playwright
        run: npx playwright install

      - name: Executando os testes
        run: yarn run test

      

